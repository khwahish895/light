<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scroll With Light</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 200vh;
    background: #0b0b0b;
    font-family: Arial, sans-serif;
    color: white;
}

/* Light Beam */
.light {
    position: fixed;
    top: 0;
    left: 50%;
    width: 300px;
    height: 100vh;
    transform: translateX(-50%);
    background: radial-gradient(circle at top, rgba(255,255,255,0.35), transparent 70%);
    pointer-events: none;
    animation: glow 3s infinite alternate;
}

/* Content */
.section {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    text-align: center;
}

/* Light Animation */
@keyframes glow {
    from {
        opacity: 0.4;
    }
    to {
        opacity: 0.8;
    }
}
</style>
</head>

<body>

<div class="light"></div>

<div class="section">
    Scroll Down
</div>

<div class="section">
    Light Follows Scroll
</div>

</body>
</html>
